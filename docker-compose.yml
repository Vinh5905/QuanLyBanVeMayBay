name: vemaybay

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: vemaybay_sqlserver
    ports:
      - "${SQL_PORT:-1433}:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD must be set}"
      DB_NAME: "${DB_NAME:-VeMayBayDB}"
      APP_DB_USER: "${APP_DB_USER:-vemaybay_app}"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./database:/database:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "SQLCMD=/opt/mssql-tools18/bin/sqlcmd; [ -x \"$$SQLCMD\" ] || SQLCMD=/opt/mssql-tools/bin/sqlcmd; \"$$SQLCMD\" -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD must be set}"
      DB_NAME: "${DB_NAME:-VeMayBayDB}"
      APP_DB_USER: "${APP_DB_USER:-vemaybay_app}"
      APP_DB_PASSWORD: "${APP_DB_PASSWORD:?APP_DB_PASSWORD must be set}"
    volumes:
      - ./database:/database:ro
    entrypoint: ["/bin/bash", "/database/init/run-init.sh"]
    restart: "no"

  backend:
    build: ./backend
    container_name: vemaybay_backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_NAME: "${DB_NAME:-VeMayBayDB}"
      DB_USER: "${APP_DB_USER:-vemaybay_app}"
      DB_PASSWORD: "${APP_DB_PASSWORD:?APP_DB_PASSWORD must be set}"
      JWT_SECRET: "${JWT_SECRET:-change-this-in-production-min-256-bits-long-secret-key!!}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost}"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: vemaybay_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlserver_data:
