spring:
  config:
    activate:
      on-profile: dev-h2

  datasource:
    url: jdbc:h2:mem:vemaybaydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
    show-sql: true

  sql:
    init:
      mode: always
      data-locations: classpath:data-dev-h2.sql

  h2:
    console:
      enabled: true
      path: /h2-console

  security:
    filter:
      order: 0

app:
  jwt:
    secret: dev-h2-secret-key-for-local-development-only-min-256-bits-long!!
    access-token-expiration: 3600000
    refresh-token-expiration: 2592000000
  cors:
    allowed-origins: http://localhost:3000

logging:
  level:
    com.vemaybay: DEBUG
    org.hibernate.SQL: DEBUG
