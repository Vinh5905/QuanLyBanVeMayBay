spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true

  datasource:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:VeMayBayDB};encrypt=true;trustServerCertificate=true

logging:
  level:
    com.vemaybay: DEBUG
    org.hibernate.SQL: DEBUG
